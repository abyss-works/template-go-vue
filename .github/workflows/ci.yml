name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci && npm run build
        working-directory: frontend

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: go build -v ./...
      - run: go vet ./...
